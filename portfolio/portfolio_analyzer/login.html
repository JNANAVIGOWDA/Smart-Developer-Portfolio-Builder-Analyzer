<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DevAnalyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="particles"></div>

    <nav class="navbar navbar-expand-lg navbar-custom py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-code gradient-text me-2"></i> DevAnalyzer
            </a>
            <div class="ms-auto">
                <i class="fa-solid fa-moon" id="theme-toggle" title="Toggle Dark/Light Mode"></i>
            </div>
        </div>
    </nav>

    <main class="container my-5 py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8" data-aos="zoom-in">
                <div class="glass-card p-5 text-center">
                    <h2 class="fw-bold mb-4">Welcome <span class="gradient-text">Back</span></h2>
                    
                    <form action="login.php" method="POST">
                        <div class="mb-4 text-start">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control bg-transparent" id="email" name="email" required placeholder="Enter your registered email">
                        </div>
                        
                        <!-- Show Error Message if any -->
                        <div id="error-message" class="text-danger small mb-3 d-none"></div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-gradient btn-lg">
                                <i class="fa-solid fa-right-to-bracket me-2"></i> Login
                            </button>
                        </div>
                    </form>
                    
                    <p class="text-muted mt-4 mb-0">Don't have an account? <a href="form.html" class="text-decoration-none gradient-text fw-bold">Create Portfolio</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const error = getQueryParam('error');
            if (error === 'notfound') {
                const el = document.getElementById('error-message');
                el.textContent = "Email not found. Please check or register a new portfolio.";
                el.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
